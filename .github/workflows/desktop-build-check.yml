name: Desktop Build Check

# Compile + bundle the Tauri desktop app on all three OSes WITHOUT publishing a
# release. Use this to verify the Rust side builds before tagging a real release
# (the dev environment has no Rust toolchain, so this is where compilation is
# actually checked). Runs on manual dispatch and on PRs touching the desktop app.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/desktop-build-check.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # No tagName → tauri-action just builds the installers and uploads them as
      # workflow artifacts; it does NOT create a GitHub Release.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
