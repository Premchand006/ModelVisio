name: Desktop Release

# Cut a cross-platform release like Netron's: tag a version and CI builds
# installers for macOS (.dmg), Windows (.exe/.msi), and Linux (.AppImage/.deb/.rpm)
# and attaches them to a GitHub Release.
#
#   npm run release:desktop -- 1.0.0      # convenience wrapper, or:
#   git tag desktop-v1.0.0 && git push origin desktop-v1.0.0
#
# The Release is created as a DRAFT so a single failed platform can never publish
# a half-finished release — review it on the Releases page and click "Publish".
on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0). Required for manual runs."
        required: true
        default: "0.0.0-dev"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (M-series)
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Derive a clean semver (strip the `desktop-v` tag prefix) and reuse it for
      # the bundle version, the release name, and the git tag.
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="desktop-v${VERSION}"
          else
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#desktop-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building ModelVisio $VERSION (tag $TAG)"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Stamp the resolved version into tauri.conf.json + Cargo.toml so installers
      # are named ModelVisio_<version>_... instead of the placeholder 0.0.0.
      - name: Stamp version
        shell: bash
        run: node scripts/stamp-version.mjs "${{ steps.version.outputs.version }}"

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auto-update signing: signs the updater artifacts + latest.json so the
          # installed app trusts them (verified against the pubkey in tauri.conf.json).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # AI chat in the desktop app reads GEMINI_API_KEY from the environment
          # that launches the app, so it is NOT needed at build time.
        with:
          projectPath: apps/desktop
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: "ModelVisio ${{ steps.version.outputs.version }}"
          releaseBody: |
            ModelVisio ${{ steps.version.outputs.version }} — AI-native neural-network model analyzer for edge deployment.

            ### Downloads
            | OS | File |
            | --- | --- |
            | **Windows** | `ModelVisio_${{ steps.version.outputs.version }}_x64-setup.exe` (or `.msi`) |
            | **macOS** (Apple Silicon) | `ModelVisio_${{ steps.version.outputs.version }}_aarch64.dmg` |
            | **macOS** (Intel) | `ModelVisio_${{ steps.version.outputs.version }}_x64.dmg` |
            | **Linux** | `.AppImage`, `.deb`, or `.rpm` |

            The desktop AI copilot needs a free Gemini API key — set `GEMINI_API_KEY`
            in the environment that launches the app (https://aistudio.google.com/apikey).

            _Built automatically by the Desktop Release workflow._
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Attach a STABLE, version-independent filename for the Windows installer so
      # the website's Download button can link to a URL that never changes:
      #   /releases/latest/download/ModelVisio-Windows-x64-setup.exe
      # (always resolves to the newest PUBLISHED release). tauri-action names the
      # asset with the version (ModelVisio_1.2.3_x64-setup.exe); this uploads a
      # fixed-name copy alongside it on the same draft release.
      - name: Attach stable-named Windows installer
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          setup=$(find apps/desktop/src-tauri/target/release/bundle/nsis -name '*-setup.exe' | head -n1)
          if [ -z "$setup" ]; then echo "No NSIS installer found under bundle/nsis" >&2; exit 1; fi
          echo "Stable-naming: $setup"
          cp "$setup" "ModelVisio-Windows-x64-setup.exe"
          gh release upload "${{ steps.version.outputs.tag }}" "ModelVisio-Windows-x64-setup.exe" --clobber
