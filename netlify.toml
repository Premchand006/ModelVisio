# Netlify deploy config for the web app (monorepo root). Set GEMINI_API_KEY
# in the Netlify site environment so the chat function can reach the Gemini API.
[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @modelvisio/web build"
  publish = "apps/web/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# The copilot client POSTs to /api/chat; the function is deployed at
# /.netlify/functions/chat. status=200 rewrites (proxies) the request so the URL
# stays /api/chat; force=true makes it win over any static/SPA fallback.
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true
